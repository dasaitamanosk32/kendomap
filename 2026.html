<h1>2026年の更新履歴</h1>

<table id="history"></table>

<script>
fetch("2026.json")
.then(res => res.json())
.then(data => {

let html = "<tr><th>日付</th><th>内容</th></tr>";

data.forEach(item => {

html += `
<tr>
<td>${item.date}</td>
<td>${item.text}</td>
</tr>
`;

});

document.getElementById("history").innerHTML = html;

});
</script>
