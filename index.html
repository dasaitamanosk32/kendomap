<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>全国険道マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map{
height:100vh;
}
</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([36.0,138.0],6);

L.tileLayer(
'https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png',
{
attribution:"国土地理院"
}
).addTo(map);

var marker = L.marker([35.7,139.7]).addTo(map);

marker.bindPopup("サンプル険道");

</script>

</body>
</html>
